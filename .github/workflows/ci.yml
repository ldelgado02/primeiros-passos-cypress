name: CI

on: push
jobs:
    biuld-test:
        runs-on: ubuntu-latest
        steps: 

            - name: Checkout
              uses: actions/checkout@v3

            - name: Cypress Tests
              uses: cypress-io/github-action@v5
              with: 
                  start: 'npm run dev'
                  biuld: 'npm run build'

            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: Cypress Results
                  path: |
                      cypress/screenshots
                      cypress/videos
                      cypress/results
                  if-no-files-found: ignore